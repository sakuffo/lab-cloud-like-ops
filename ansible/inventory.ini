# inventory.ini
# Ansible inventory file for Ubuntu VMs

[ubuntu_vms]
ubuntu-vm ansible_host=10.1.1.227 ansible_user=ubuntu

# Example of multiple VMs:
# ubuntu-vm-1 ansible_host=10.1.1.227 ansible_user=ubuntu
# ubuntu-vm-2 ansible_host=10.1.1.228 ansible_user=ubuntu
# ubuntu-vm-3 ansible_host=10.1.1.229 ansible_user=ubuntu

[ubuntu_vms:vars]
# Common variables for all Ubuntu VMs
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# Authentication options:
# Option 1: SSH key authentication (recommended)
# ansible_ssh_private_key_file=~/.ssh/id_rsa

# Option 2: Password authentication
# ansible_ssh_pass=your_password
# ansible_become_pass=your_sudo_password